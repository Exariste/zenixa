<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenixa Digital Lab — Stats Bar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
<style>body{background:#0a0c10;padding:20px 0;}</style>
</head>
<body>

<!-- STATS -->
<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat-item fade-up">
      <div class="stat-num">13<span class="stat-plus">+</span></div>
      <div class="stat-label">Projects Completed</div>
    </div>
    <div class="stat-item fade-up">
      <div class="stat-num">13<span class="stat-plus">+</span></div>
      <div class="stat-label">Happy Clients</div>
    </div>
    <div class="stat-item fade-up">
      <div class="stat-num">100<span class="stat-plus">%</span></div>
      <div class="stat-label">Client Satisfaction</div>
    </div>
    <div class="stat-item fade-up">
      <div class="stat-num">24<span class="stat-plus">/7</span></div>
      <div class="stat-label">Support Available</div>
    </div>
  </div>
</div>



</body>
</html>
